<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared with you — JSON.fit</title>
<meta name="description" content="Someone shared a workout or meal plan with you on JSON.fit. Open it in the app or download to import.">
<link rel="icon" type="image/x-icon" href="favicon-3.ico">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32-3.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192-3.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180-3.png">
<meta name="robots" content="noindex">
<meta property="og:title" content="Shared with you — JSON.fit">
<meta property="og:description" content="A workout or meal plan was shared with you on JSON.fit.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://json.fit/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --cyan: #22d3ee;
  --cyan-soft: rgba(34,211,238,0.08);
  --cyan-glow: rgba(34,211,238,0.35);
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
  --bg: #050508;
  --surface: #0a0a0f;
  --surface-2: #111116;
  --border: rgba(255,255,255,0.06);
  --border-cyan: rgba(34,211,238,0.14);
  --text: #f0f0f2;
  --text-2: #9898a4;
  --text-3: #55555f;
}

* , *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow-x: hidden; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Outfit', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden; line-height: 1.7; font-size: 16px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

.cyan { color: var(--cyan); }
.green { color: var(--green); }

/* ── Nav ── */
nav {
  position: sticky; top: 0; z-index: 100;
  padding: 0 1.5rem; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(5,5,8,0.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'DM Mono', monospace; font-weight: 500; font-size: 1rem;
  color: var(--text); text-decoration: none;
  display: flex; align-items: center; gap: 0.4rem;
}

/* ── Layout ── */
main {
  flex: 1;
  padding: 3rem 1.5rem 4rem;
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
}

@media (max-width: 600px) {
  main { padding: 2rem 1.25rem 3rem; }
}

/* ── States ── */
.state { display: none; }
.state.active { display: block; }

/* ── Loading ── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  gap: 1.25rem; padding: 4rem 1rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'DM Mono', monospace; font-size: 0.75rem;
  color: var(--text-3); letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── Error ── */
.error {
  text-align: center; padding: 3rem 1rem;
}
.error-icon {
  width: 48px; height: 48px;
  margin: 0 auto 1.25rem;
  border-radius: 50%;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  display: flex; align-items: center; justify-content: center;
  color: var(--red);
}
.error h2 {
  font-size: 1.4rem; font-weight: 700;
  letter-spacing: -0.02em; margin-bottom: 0.5rem;
}
.error p {
  color: var(--text-2); font-size: 0.95rem;
  max-width: 360px; margin: 0 auto 1.75rem;
}
.error-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.75rem 1.5rem; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600;
  text-decoration: none; font-family: 'Outfit', sans-serif;
  background: transparent; color: var(--text-2);
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.error-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-soft); }

/* ── Content ── */
.content { animation: fadeUp 0.6s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.share-header {
  text-align: center; margin-bottom: 2rem;
}
.share-label {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.3rem 0.9rem;
  border: 1px solid var(--border-cyan);
  border-radius: 100px;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem; color: var(--cyan);
  background: var(--cyan-soft);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 1.5rem;
}
.share-label-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.share-title {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800; letter-spacing: -0.02em;
  line-height: 1.15; margin-bottom: 0.5rem;
}
.share-subtitle {
  color: var(--text-3); font-size: 0.85rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
}

/* ── Preview Card ── */
.preview-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 1.5rem;
  position: relative;
}
.preview-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-cyan), transparent);
}

.preview-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
}
.preview-stats + .preview-stats {
  border-top: 1px solid var(--border);
}
.stat {
  background: var(--surface);
  padding: 1.25rem 0.75rem;
  text-align: center;
}
.stat-num {
  font-family: 'DM Mono', monospace;
  font-size: 1.5rem; font-weight: 500;
  color: var(--cyan); line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 0.4rem;
}
.stat.green .stat-num { color: var(--green); }
.stat-lbl {
  font-size: 0.72rem; color: var(--text-3);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
}

.preview-body {
  padding: 1.5rem;
}

@media (max-width: 600px) {
  .preview-body { padding: 1.25rem; }
  .stat { padding: 1rem 0.5rem; }
  .stat-num { font-size: 1.25rem; }
  .stat-lbl { font-size: 0.65rem; }
}

.preview-section {
  margin-bottom: 1.25rem;
}
.preview-section:last-child { margin-bottom: 0; }
.preview-section-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; color: var(--cyan);
  letter-spacing: 0.16em; text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.preview-section h3 {
  font-size: 0.95rem; font-weight: 700;
  color: var(--text); margin-bottom: 0.5rem;
}
.preview-section p {
  font-size: 0.85rem; color: var(--text-2);
  line-height: 1.65;
}

.preview-list {
  list-style: none; padding: 0;
}
.preview-list li {
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  gap: 0.75rem;
  font-size: 0.85rem;
}
.preview-list li:last-child { border-bottom: none; }
.preview-list .item-name {
  color: var(--text); font-weight: 500;
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.preview-list .item-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem; color: var(--text-3);
  flex-shrink: 0;
}

.preview-more {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem; color: var(--text-3);
  text-align: center; padding: 0.75rem 0;
  letter-spacing: 0.06em;
}

/* ── Block tabs ── */
.block-tabs {
  display: flex; gap: 0.4rem;
  padding: 1rem 1rem 0;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.block-tabs::-webkit-scrollbar { display: none; }
.block-tab {
  flex-shrink: 0;
  padding: 0.45rem 0.85rem;
  border-radius: 8px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.block-tab:hover { color: var(--text); border-color: var(--border-cyan); }
.block-tab.active {
  background: var(--cyan-soft);
  border-color: var(--border-cyan);
  color: var(--cyan);
}
.type-meal .block-tab.active {
  background: rgba(34,197,94,0.08);
  border-color: rgba(34,197,94,0.2);
  color: var(--green);
}

/* ── Day blocks ── */
.day-group {
  margin-bottom: 0.5rem;
}
.day-group:last-child { margin-bottom: 0; }
.day-header {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem; color: var(--cyan);
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 0.85rem 0;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 0.6rem;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}
.day-group:first-child .day-header {
  border-top: none;
  padding-top: 0;
}
.day-header:hover { color: var(--text); }
.type-meal .day-header { color: var(--green); }
.type-meal .day-header:hover { color: var(--text); }
.day-header .day-meta {
  color: var(--text-3);
  margin-left: auto;
  letter-spacing: 0.1em;
  font-weight: 400;
  text-transform: none;
  font-size: 0.7rem;
}
.day-chev {
  width: 12px; height: 12px;
  color: var(--text-3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.day-group.open .day-chev {
  transform: rotate(90deg);
  color: var(--cyan);
}
.type-meal .day-group.open .day-chev {
  color: var(--green);
}
.day-content {
  display: none;
  padding-bottom: 0.85rem;
}
.day-group.open .day-content {
  display: block;
  animation: slideDown 0.22s ease;
}

/* Meal plan day label — non-accordion, just a header */
.day-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem; color: var(--green);
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 0 0 0.85rem;
  display: flex; align-items: center; gap: 0.6rem;
}
.day-label .day-meta {
  color: var(--text-3);
  margin-left: auto;
  letter-spacing: 0.1em;
  font-weight: 400;
  text-transform: none;
  font-size: 0.7rem;
}

/* ── Expandable rows ── */
.preview-list li.expandable {
  cursor: pointer;
  transition: background 0.15s;
  padding: 0.65rem 0.5rem;
  margin: 0 -0.5rem;
  border-radius: 6px;
  flex-wrap: wrap;
}
.preview-list li.expandable:hover {
  background: var(--surface-2);
}
.preview-list li.expandable .chevron {
  width: 14px; height: 14px;
  color: var(--text-3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.preview-list li.expanded .chevron {
  transform: rotate(90deg);
  color: var(--cyan);
}
.type-meal .preview-list li.expanded .chevron {
  color: var(--green);
}

.exercise-detail {
  display: none;
  width: 100%;
  flex-basis: 100%;
  padding: 0.75rem 0 0.5rem;
  margin-top: 0.5rem;
  border-top: 1px dashed var(--border);
  font-size: 0.8rem;
  color: var(--text-2);
  line-height: 1.65;
}
.preview-list li.expanded .exercise-detail {
  display: block;
  animation: slideDown 0.22s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.detail-row {
  display: flex; gap: 0.5rem;
  margin-bottom: 0.4rem;
  align-items: flex-start;
}
.detail-row:last-child { margin-bottom: 0; }
.detail-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  flex-shrink: 0;
  width: 56px;
  padding-top: 0.1rem;
}
.detail-value {
  flex: 1;
  font-size: 0.8rem;
  color: var(--text-2);
}
.detail-value.muted {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-3);
}

/* ── Toggle button (for "+ N more" expand) ── */
.toggle-more {
  display: block;
  width: 100%;
  text-align: center;
  padding: 0.85rem 0 0.4rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  color: var(--text-3);
  letter-spacing: 0.06em;
  background: transparent;
  border: none;
  cursor: pointer;
  transition: color 0.15s;
}
.toggle-more:hover {
  color: var(--cyan);
}
.type-meal .toggle-more:hover {
  color: var(--green);
}
.toggle-more .chev {
  display: inline-block;
  margin-left: 0.3rem;
  transition: transform 0.2s;
  font-size: 0.85em;
}
.toggle-more.expanded .chev {
  transform: rotate(180deg);
}

/* ── CTA ── */
.cta-section {
  margin-top: 2rem; text-align: center;
}
.cta-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.5rem; width: 100%;
  padding: 1rem 2rem; border-radius: 12px;
  font-size: 1rem; font-weight: 700;
  text-decoration: none; font-family: 'Outfit', sans-serif;
  background: var(--cyan); color: #000;
  border: none; cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s;
  margin-bottom: 1rem;
}
.cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--cyan-glow); }

.cta-divider {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 1.5rem 0 1.25rem;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem; letter-spacing: 0.08em;
  text-transform: uppercase;
}
.cta-divider::before, .cta-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.cta-secondary-text {
  font-size: 0.85rem; color: var(--text-2);
  margin-bottom: 1rem;
}

.app-store-link {
  display: inline-block;
  transition: transform 0.2s, opacity 0.2s;
}
.app-store-link:hover { transform: translateY(-1px); opacity: 0.9; }
.app-store-link img {
  height: 44px; display: block; border-radius: 8px;
}

.android-text {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem; color: var(--text-3);
  letter-spacing: 0.04em; margin-top: 0.75rem;
}

.cta-foot {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem; color: var(--text-3);
  letter-spacing: 0.04em; margin-top: 1.5rem;
}

/* ── Footer ── */
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem; text-align: center;
}
.foot-l {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem; color: var(--text-3);
}
.foot-l a {
  color: var(--text-3); text-decoration: none;
  margin: 0 0.75rem; transition: color 0.2s;
}
.foot-l a:hover { color: var(--cyan); }

/* ── Type-specific accents ── */
.type-meal .share-label,
.type-meal .preview-card::before {
  border-color: rgba(34,197,94,0.2);
  color: var(--green);
  background: rgba(34,197,94,0.05);
}
.type-meal .preview-section-lbl { color: var(--green); }
.type-meal .stat-num { color: var(--green); }
.type-meal .share-label-dot { background: var(--green); }
.type-meal .preview-card::before {
  background: linear-gradient(90deg, transparent, rgba(34,197,94,0.2), transparent);
}

/* ── Debug Panel ── */
.debug-toggle {
  display: block;
  margin: 2rem auto 0;
  padding: 0.5rem 1rem;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.06em;
  cursor: pointer;
  transition: all 0.15s;
}
.debug-toggle:hover {
  color: var(--cyan);
  border-color: var(--border-cyan);
}
.debug-panel {
  display: none;
  margin: 1rem auto 0;
  background: #000;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  line-height: 1.55;
  color: var(--text-2);
  word-break: break-word;
  max-width: 100%;
}
.debug-panel.visible { display: block; }
.debug-panel h4 {
  font-size: 0.7rem;
  color: var(--cyan);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
  font-weight: 500;
}
.debug-panel .debug-row {
  margin-bottom: 0.35rem;
  display: flex;
  gap: 0.5rem;
}
.debug-panel .debug-key {
  color: var(--text-3);
  flex-shrink: 0;
  min-width: 90px;
}
.debug-panel .debug-val {
  color: var(--text);
  word-break: break-all;
  flex: 1;
}
.debug-panel .debug-val.ok { color: var(--green); }
.debug-panel .debug-val.warn { color: #f59e0b; }
.debug-panel .debug-val.bad { color: var(--red); }
.debug-log {
  margin-top: 0.85rem;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
  max-height: 280px;
  overflow-y: auto;
}
.debug-log-entry {
  font-size: 0.68rem;
  margin-bottom: 0.3rem;
  color: var(--text-2);
}
.debug-log-entry .ts {
  color: var(--text-3);
  margin-right: 0.4rem;
}
.debug-actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 0.75rem;
}
.debug-btn {
  flex: 1;
  padding: 0.5rem;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-2);
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.15s;
}
.debug-btn:hover { color: var(--cyan); border-color: var(--border-cyan); }
.debug-btn.copied { color: var(--green); border-color: rgba(34,197,94,0.3); }
</style>
</head>
<body>

<nav>
  <a href="https://json.fit" class="nav-logo">
    <svg width="18" height="12" viewBox="0 0 22 14" fill="none">
      <rect x="0" y="3" width="4" height="8" rx="1.5" fill="#22d3ee"/>
      <rect x="18" y="3" width="4" height="8" rx="1.5" fill="#22d3ee"/>
      <rect x="4" y="5" width="14" height="4" rx="2" fill="#22d3ee"/>
    </svg>
    JSON<span class="cyan">.fit</span>
  </a>
</nav>

<main>

  <!-- LOADING STATE -->
  <div class="state active" id="state-loading">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading shared content</div>
    </div>
  </div>

  <!-- ERROR STATE -->
  <div class="state" id="state-error">
    <div class="error">
      <div class="error-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h2 id="error-title">This link has expired</h2>
      <p id="error-msg">Shared links last 7 days. Ask the sender for a new link, or get JSON.fit to share your own.</p>
      <a href="https://json.fit" class="error-btn">
        Visit JSON.fit
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>
  </div>

  <!-- CONTENT STATE -->
  <div class="state" id="state-content">
    <div class="content" id="content-inner"></div>
  </div>

</main>

<footer>
  <div class="foot-l">
    <a href="https://json.fit">json.fit</a>
    <a href="https://json.fit/privacy-policy.html">Privacy</a>
    <a href="https://json.fit/terms-of-service.html">Terms</a>
  </div>
</footer>

<script>
const API_BASE = 'https://eb6x42gp3h.execute-api.ap-southeast-2.amazonaws.com';
const APP_STORE_URL = 'https://apps.apple.com/au/app/json-fit/id6758357834';
const FALLBACK_DELAY_MS = 2000;

// Extract shareId from URL path /p/{shareId}
function getShareId() {
  const match = window.location.pathname.match(/\/p\/([A-Za-z0-9_-]+)/);
  return match ? match[1] : null;
}

function showState(stateId) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
  document.getElementById(stateId).classList.add('active');
}

function showError(title, msg) {
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-msg').textContent = msg;
  showState('state-error');
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Detect content type from the data shape
function detectType(data) {
  // Workout shape: routine_name, days_per_week, blocks
  if (data.routine_name || data.days_per_week !== undefined || (Array.isArray(data.blocks) && data.blocks[0]?.block_name)) {
    return 'workout';
  }
  // Meal plan shape: dailyMeals, startDate, name with meals
  if (data.dailyMeals || data.startDate || (data.name && /meal|nutrition|calories/i.test(JSON.stringify(data).slice(0, 500)))) {
    return 'meal';
  }
  // Default to workout for unknown shapes
  return 'workout';
}

function renderWorkout(data) {
  const name = data.routine_name || data.name || 'Shared Workout';
  const description = data.description || '';
  const daysPerWeek = data.days_per_week || data.training_days || (data.blocks && data.blocks[0]?.weekly_schedule?.length) || 0;
  const blocks = data.blocks || [];

  // Total weeks across all blocks (sum of each block's week range)
  let totalWeeks = 0;
  for (const b of blocks) {
    if (!b.weeks) continue;
    const m = String(b.weeks).match(/(\d+)\s*-\s*(\d+)/);
    if (m) totalWeeks += (parseInt(m[2]) - parseInt(m[1]) + 1);
    else {
      const single = parseInt(b.weeks);
      if (!isNaN(single)) totalWeeks += single;
    }
  }
  // Fallback if no week ranges given
  if (totalWeeks === 0 && blocks[0]?.weeks) {
    const m = String(blocks[0].weeks).match(/(\d+)\s*-\s*(\d+)/);
    if (m) totalWeeks = parseInt(m[2]);
  }

  const stats = [];
  if (daysPerWeek) stats.push({ num: daysPerWeek, lbl: 'days/week' });
  if (totalWeeks) stats.push({ num: totalWeeks + 'wk', lbl: 'program' });
  if (blocks.length) stats.push({ num: blocks.length, lbl: blocks.length === 1 ? 'block' : 'blocks' });

  // Build block tabs (only if multiple blocks)
  const showTabs = blocks.length > 1;
  const tabsHtml = showTabs ? `
    <div class="block-tabs" role="tablist">
      ${blocks.map((b, i) => `
        <button class="block-tab ${i === 0 ? 'active' : ''}"
                data-block-index="${i}"
                role="tab">
          ${escapeHtml(b.block_name || ('Block ' + (i + 1)))}
        </button>
      `).join('')}
    </div>
  ` : '';

  // For each block, render all days fully (with expandable exercises)
  const blocksHtml = blocks.map((block, blockIdx) => {
    const days = (block.days || []).filter(d => d.exercises && d.exercises.length > 0);

    const daysHtml = days.map((day, dayIdx) => {
      const dayName = day.day_name || ('Day ' + (dayIdx + 1));
      const duration = day.estimated_duration ? `~${day.estimated_duration} min` : '';
      const exercises = day.exercises || [];

      // Show first 4 by default, rest collapsed
      const visible = exercises.slice(0, 4);
      const hidden = exercises.slice(4);

      const renderExercise = (ex, exIdx) => {
        const exName = ex.exercise || ex.name || 'Exercise';
        const sets = ex.sets;
        const reps = ex.reps;
        const meta = sets && reps ? `${sets} × ${reps}` : (sets || reps || '');

        // Detail content (visible when expanded)
        const notes = ex.notes;
        const repsWeekly = ex.reps_weekly;
        const rirWeekly = ex.rir_weekly;
        const rest = ex.rest;
        const muscles = [...(ex.primaryMuscles || []), ...(ex.secondaryMuscles || [])];

        // Format weekly data (e.g. {1: "8, 7, 6", 2: "7, 6, 5"})
        const formatWeekly = (obj) => {
          if (!obj || typeof obj !== 'object') return '';
          return Object.entries(obj)
            .map(([w, v]) => `W${w}: ${v}`)
            .join(' · ');
        };

        const hasDetail = notes || repsWeekly || rirWeekly || rest || muscles.length;

        return `
          <li class="${hasDetail ? 'expandable' : ''}" data-exercise-row>
            <span class="item-name">${escapeHtml(exName)}</span>
            <span class="item-meta">${escapeHtml(meta)}</span>
            ${hasDetail ? `
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
              <div class="exercise-detail" data-exercise-detail>
                ${rest ? `
                  <div class="detail-row">
                    <span class="detail-label">Rest</span>
                    <span class="detail-value muted">${escapeHtml(String(rest))}s</span>
                  </div>
                ` : ''}
                ${muscles.length ? `
                  <div class="detail-row">
                    <span class="detail-label">Targets</span>
                    <span class="detail-value">${escapeHtml(muscles.join(', '))}</span>
                  </div>
                ` : ''}
                ${repsWeekly ? `
                  <div class="detail-row">
                    <span class="detail-label">Reps</span>
                    <span class="detail-value muted">${escapeHtml(formatWeekly(repsWeekly))}</span>
                  </div>
                ` : ''}
                ${rirWeekly ? `
                  <div class="detail-row">
                    <span class="detail-label">RIR</span>
                    <span class="detail-value muted">${escapeHtml(formatWeekly(rirWeekly))}</span>
                  </div>
                ` : ''}
                ${notes ? `
                  <div class="detail-row">
                    <span class="detail-label">Notes</span>
                    <span class="detail-value">${escapeHtml(notes)}</span>
                  </div>
                ` : ''}
              </div>
            ` : ''}
          </li>
        `;
      };

      const visibleHtml = visible.map(renderExercise).join('');
      const hiddenHtml = hidden.map(renderExercise).join('');

      return `
        <div class="day-group ${dayIdx === 0 ? 'open' : ''}" data-day-group>
          <div class="day-header" data-day-toggle>
            <svg class="day-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
            ${escapeHtml(dayName)}${duration ? `<span class="day-meta">${escapeHtml(duration)}</span>` : ''}
          </div>
          <div class="day-content">
            <ul class="preview-list" data-day-list>
              ${visibleHtml}
              ${hidden.length ? `
                <div data-hidden-rows style="display:none;">
                  ${hiddenHtml}
                </div>
                <button class="toggle-more" data-toggle-more>
                  + ${hidden.length} more exercise${hidden.length === 1 ? '' : 's'}
                  <span class="chev">▾</span>
                </button>
              ` : ''}
            </ul>
          </div>
        </div>
      `;
    }).join('');

    return `
      <div class="block-panel" data-block-panel="${blockIdx}" ${blockIdx === 0 ? '' : 'style="display:none;"'}>
        ${daysHtml || '<p style="color:var(--text-3);font-size:0.85rem;">No exercises in this block.</p>'}
      </div>
    `;
  }).join('');

  return `
    <div class="share-header">
      <div class="share-label">
        <span class="share-label-dot"></span>
        Workout shared with you
      </div>
      <h1 class="share-title">${escapeHtml(name)}</h1>
      <p class="share-subtitle">Open in JSON.fit to import</p>
    </div>

    <div class="preview-card">
      ${stats.length ? `
        <div class="preview-stats">
          ${stats.map(s => `
            <div class="stat">
              <div class="stat-num">${escapeHtml(String(s.num))}</div>
              <div class="stat-lbl">${escapeHtml(s.lbl)}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
      ${tabsHtml}
      <div class="preview-body">
        ${description ? `
          <div class="preview-section">
            <div class="preview-section-lbl">About</div>
            <p>${escapeHtml(description)}</p>
          </div>
        ` : ''}
        ${blocksHtml}
      </div>
    </div>

    ${renderCTA('workout')}
  `;
}

function renderMealPlan(data) {
  const name = data.name || 'Shared Meal Plan';
  const dailyMeals = data.dailyMeals || {};
  const days = Object.keys(dailyMeals).sort();
  const dayCount = days.length;

  // Compute average daily macros across all days (more representative than just day 1)
  let avgKcal = 0, avgProtein = 0, avgCarbs = 0, avgFat = 0;
  if (days.length > 0) {
    let totalKcal = 0, totalProtein = 0, totalCarbs = 0, totalFat = 0;
    let daysCounted = 0;
    for (const dateKey of days) {
      const day = dailyMeals[dateKey];
      const meals = day?.meals || [];
      if (meals.length === 0) continue;
      totalKcal += meals.reduce((s, m) => s + (m.calories || 0), 0);
      totalProtein += meals.reduce((s, m) => s + (m.macros?.protein || 0), 0);
      totalCarbs += meals.reduce((s, m) => s + (m.macros?.carbs || 0), 0);
      totalFat += meals.reduce((s, m) => s + (m.macros?.fat || 0), 0);
      daysCounted++;
    }
    if (daysCounted > 0) {
      avgKcal = totalKcal / daysCounted;
      avgProtein = totalProtein / daysCounted;
      avgCarbs = totalCarbs / daysCounted;
      avgFat = totalFat / daysCounted;
    }
  }

  // Compute total grocery cost — handles low/high range, single value, or string format
  let totalCost = null;
  let costCurrency = '$';
  const grocery = data.grocery_list;
  if (grocery) {
    if (grocery.currency) {
      // Strip "AU$" -> "$", "USD" -> "$", etc; keep first non-letter symbol or default to $
      const c = String(grocery.currency).match(/[$€£¥]/);
      if (c) costCurrency = c[0];
    }
    if (typeof grocery.total_estimated_cost_low === 'number' && typeof grocery.total_estimated_cost_high === 'number') {
      totalCost = Math.round((grocery.total_estimated_cost_low + grocery.total_estimated_cost_high) / 2);
    } else if (typeof grocery.total_estimated_cost === 'number') {
      totalCost = Math.round(grocery.total_estimated_cost);
    } else if (typeof grocery.total_estimated_cost_low === 'number') {
      totalCost = Math.round(grocery.total_estimated_cost_low);
    }
  }

  // Build day tabs (only if multiple days)
  const showDayTabs = days.length > 1;
  const dayTabsHtml = showDayTabs ? `
    <div class="block-tabs" role="tablist">
      ${days.map((dateKey, i) => {
        const day = dailyMeals[dateKey];
        const label = day?.dayName || ('Day ' + (i + 1));
        return `
          <button class="block-tab ${i === 0 ? 'active' : ''}"
                  data-block-index="${i}"
                  role="tab">
            ${escapeHtml(label)}
          </button>
        `;
      }).join('')}
    </div>
  ` : '';

  // Render each day as a panel (only first visible by default)
  const renderMeal = (m) => {
    const mealName = m.name || m.type || 'Meal';
    const cals = m.calories ? Math.round(m.calories) + ' kcal' : '';
    const macros = m.macros || {};
    const ingredients = m.ingredients || [];

    const hasDetail = (macros.protein != null) || (macros.carbs != null) || (macros.fat != null) || ingredients.length > 0;

    const macroLine = [
      macros.protein != null ? `${Math.round(macros.protein)}g P` : null,
      macros.carbs != null ? `${Math.round(macros.carbs)}g C` : null,
      macros.fat != null ? `${Math.round(macros.fat)}g F` : null,
    ].filter(Boolean).join(' · ');

    return `
      <li class="${hasDetail ? 'expandable' : ''}" data-exercise-row>
        <span class="item-name">${escapeHtml(mealName)}</span>
        <span class="item-meta">${escapeHtml(cals)}</span>
        ${hasDetail ? `
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <div class="exercise-detail" data-exercise-detail>
            ${macroLine ? `
              <div class="detail-row">
                <span class="detail-label">Macros</span>
                <span class="detail-value muted">${escapeHtml(macroLine)}</span>
              </div>
            ` : ''}
            ${ingredients.length ? `
              <div class="detail-row">
                <span class="detail-label">Includes</span>
                <span class="detail-value">${escapeHtml(ingredients.slice(0, 6).map(i => i.item || i.name || '').filter(Boolean).join(', '))}${ingredients.length > 6 ? ` + ${ingredients.length - 6} more` : ''}</span>
              </div>
            ` : ''}
          </div>
        ` : ''}
      </li>
    `;
  };

  const daysHtml = days.map((dateKey, i) => {
    const day = dailyMeals[dateKey];
    const meals = day?.meals || [];
    const dayName = day?.dayName || ('Day ' + (i + 1));

    // Day-level totals
    const dayKcal = meals.reduce((s, m) => s + (m.calories || 0), 0);
    const dayProtein = meals.reduce((s, m) => s + (m.macros?.protein || 0), 0);
    const dayMeta = dayKcal ? `${Math.round(dayKcal).toLocaleString()} kcal · ${Math.round(dayProtein)}g P` : '';

    const visible = meals.slice(0, 4);
    const hidden = meals.slice(4);

    return `
      <div class="block-panel" data-block-panel="${i}" ${i === 0 ? '' : 'style="display:none;"'}>
        <div class="day-group open" data-meal-day>
          <div class="day-label">
            ${escapeHtml(dayName)}${dayMeta ? `<span class="day-meta">${escapeHtml(dayMeta)}</span>` : ''}
          </div>
          <ul class="preview-list" data-day-list>
            ${visible.map(renderMeal).join('')}
            ${hidden.length ? `
              <div data-hidden-rows style="display:none;">
                ${hidden.map(renderMeal).join('')}
              </div>
              <button class="toggle-more" data-toggle-more>
                + ${hidden.length} more meal${hidden.length === 1 ? '' : 's'}
                <span class="chev">▾</span>
              </button>
            ` : ''}
          </ul>
        </div>
      </div>
    `;
  }).join('');

  // Build stat rows: row 1 (practical) + row 2 (macros)
  // Row 1: days, kcal/day, total cost
  const row1 = [];
  if (dayCount) row1.push({ num: dayCount, lbl: dayCount === 1 ? 'day' : 'days' });
  if (avgKcal) row1.push({ num: Math.round(avgKcal).toLocaleString(), lbl: 'kcal/day' });
  if (totalCost != null) row1.push({ num: costCurrency + totalCost.toLocaleString(), lbl: 'grocery cost' });

  // Row 2: protein, carbs, fat
  const row2 = [];
  if (avgProtein) row2.push({ num: Math.round(avgProtein) + 'g', lbl: 'protein' });
  if (avgCarbs) row2.push({ num: Math.round(avgCarbs) + 'g', lbl: 'carbs' });
  if (avgFat) row2.push({ num: Math.round(avgFat) + 'g', lbl: 'fat' });

  const renderStatRow = (row) => row.length ? `
    <div class="preview-stats">
      ${row.map(s => `
        <div class="stat green">
          <div class="stat-num">${escapeHtml(String(s.num))}</div>
          <div class="stat-lbl">${escapeHtml(s.lbl)}</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="share-header">
      <div class="share-label">
        <span class="share-label-dot"></span>
        Meal plan shared with you
      </div>
      <h1 class="share-title">${escapeHtml(name)}</h1>
      <p class="share-subtitle">Open in JSON.fit to import</p>
    </div>

    <div class="preview-card">
      ${renderStatRow(row1)}
      ${renderStatRow(row2)}
      ${dayTabsHtml}
      <div class="preview-body">
        ${daysHtml}
      </div>
    </div>

    ${renderCTA('meal')}
  `;
}

function renderCTA(type) {
  return `
    <div class="cta-section">
      <button class="cta-btn" id="open-in-app-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Open in JSON.fit
      </button>

      <div class="cta-divider">Don't have the app?</div>

      <p class="cta-secondary-text">Get JSON.fit free to import this ${type === 'meal' ? 'meal plan' : 'workout'}.</p>

      <a href="${APP_STORE_URL}" class="app-store-link" onclick="gtag('event','share_page_app_store_click',{type:'${type}'})">
        <img src="https://json.fit/images/App_Store.svg" alt="Download on the App Store" onerror="this.outerHTML='<span style=&quot;display:inline-block;padding:0.75rem 1.5rem;border:1px solid var(--border);border-radius:10px;color:var(--text);font-weight:600;font-size:0.9rem;&quot;>Download on the App Store</span>'">
      </a>

      <div class="android-text">Android coming soon</div>

      <div class="cta-foot">Free workouts forever · No subscription</div>

      <button class="debug-toggle" id="debug-toggle">show debug ▾</button>
      <div class="debug-panel" id="debug-panel">
        <h4>Diagnostic Info</h4>
        <div id="debug-static"></div>
        <div class="debug-log" id="debug-log">
          <div class="debug-log-entry"><span class="ts">--</span>tap "Open in JSON.fit" — log fills here</div>
        </div>
        <div class="debug-actions">
          <button class="debug-btn" id="debug-copy">Copy log</button>
          <button class="debug-btn" id="debug-clear">Clear</button>
        </div>
      </div>
    </div>
  `;
}

// ── Debug logger ──
const debugLog = [];
function dlog(msg, val) {
  const ts = new Date().toISOString().split('T')[1].slice(0, -1);
  const entry = { ts, msg, val };
  debugLog.push(entry);
  const el = document.getElementById('debug-log');
  if (el) {
    const valStr = val !== undefined ? ` → ${typeof val === 'object' ? JSON.stringify(val) : val}` : '';
    const line = document.createElement('div');
    line.className = 'debug-log-entry';
    line.innerHTML = `<span class="ts">${ts}</span>${escapeHtml(msg + valStr)}`;
    // Remove placeholder if first real entry
    if (el.children.length === 1 && el.children[0].textContent.includes('tap')) el.innerHTML = '';
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  }
}

function setupDebugPanel() {
  const toggle = document.getElementById('debug-toggle');
  const panel = document.getElementById('debug-panel');
  const staticEl = document.getElementById('debug-static');
  const copyBtn = document.getElementById('debug-copy');
  const clearBtn = document.getElementById('debug-clear');
  if (!toggle || !panel) return;

  // Static info populated once
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isSafari = /^((?!chrome|android).)*safari/i.test(ua);
  const standalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  const referrer = document.referrer || '(none)';
  const visState = document.visibilityState;

  staticEl.innerHTML = `
    <div class="debug-row"><span class="debug-key">URL</span><span class="debug-val">${escapeHtml(window.location.href)}</span></div>
    <div class="debug-row"><span class="debug-key">Pathname</span><span class="debug-val">${escapeHtml(window.location.pathname)}</span></div>
    <div class="debug-row"><span class="debug-key">ShareID</span><span class="debug-val ${getShareId() ? 'ok' : 'bad'}">${escapeHtml(getShareId() || '(none extracted)')}</span></div>
    <div class="debug-row"><span class="debug-key">Platform</span><span class="debug-val ${isIOS ? 'ok' : 'warn'}">${isIOS ? 'iOS' : 'Other'} · ${isSafari ? 'Safari' : 'Other browser'}</span></div>
    <div class="debug-row"><span class="debug-key">Standalone</span><span class="debug-val">${standalone ? 'YES (PWA)' : 'No (in-browser)'}</span></div>
    <div class="debug-row"><span class="debug-key">Referrer</span><span class="debug-val">${escapeHtml(referrer)}</span></div>
    <div class="debug-row"><span class="debug-key">Visibility</span><span class="debug-val">${visState}</span></div>
    <div class="debug-row"><span class="debug-key">UA</span><span class="debug-val">${escapeHtml(ua.slice(0, 100))}</span></div>
  `;

  toggle.addEventListener('click', () => {
    panel.classList.toggle('visible');
    toggle.textContent = panel.classList.contains('visible') ? 'hide debug ▴' : 'show debug ▾';
  });

  copyBtn?.addEventListener('click', async () => {
    const allLogs = debugLog.map(e => `[${e.ts}] ${e.msg}${e.val !== undefined ? ' → ' + (typeof e.val === 'object' ? JSON.stringify(e.val) : e.val) : ''}`).join('\n');
    const fullText = `=== JSON.fit Share Page Debug ===\nURL: ${window.location.href}\nUA: ${ua}\nReferrer: ${referrer}\n\n--- Log ---\n${allLogs}`;
    try {
      await navigator.clipboard.writeText(fullText);
      copyBtn.classList.add('copied');
      copyBtn.textContent = '✓ Copied';
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        copyBtn.textContent = 'Copy log';
      }, 2000);
    } catch (err) {
      // Fallback for browsers without clipboard API
      const ta = document.createElement('textarea');
      ta.value = fullText;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); copyBtn.textContent = '✓ Copied'; } catch {}
      document.body.removeChild(ta);
    }
  });

  clearBtn?.addEventListener('click', () => {
    debugLog.length = 0;
    document.getElementById('debug-log').innerHTML = '<div class="debug-log-entry"><span class="ts">--</span>cleared</div>';
  });

  // Visibility change tracking — tells us if the page was hidden (i.e., app took over)
  document.addEventListener('visibilitychange', () => {
    dlog('visibilitychange', document.visibilityState);
  });

  // Page unload tracking
  window.addEventListener('pagehide', () => dlog('pagehide event'));
  window.addEventListener('beforeunload', () => dlog('beforeunload event'));
}

function setupOpenInAppButton() {
  const btn = document.getElementById('open-in-app-btn');
  if (!btn) return;

  btn.addEventListener('click', (e) => {
    e.preventDefault();
    const startTime = Date.now();
    const wasHidden = document.hidden;

    dlog('button clicked');
    dlog('  start time', startTime);
    dlog('  was hidden', wasHidden);
    dlog('  current url', window.location.href);

    if (typeof gtag === 'function') {
      gtag('event', 'share_page_open_in_app_click');
    }

    const universalLink = window.location.href;

    // Try multiple methods to trigger the universal link, each as a fallback for the next.
    // iOS will only intercept the first navigation that successfully matches an associated domain.

    dlog('attempting method 1: anchor click');
    try {
      const a = document.createElement('a');
      a.href = universalLink;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      dlog('  method 1 dispatched');
    } catch (err) {
      dlog('  method 1 ERROR', err.message);
    }

    // Method 2: after a short delay, try direct location assignment
    // (some iOS versions need this trick instead)
    setTimeout(() => {
      dlog('500ms check', { hidden: document.hidden, visible: document.visibilityState });
      if (!document.hidden) {
        dlog('attempting method 2: location.assign');
        try {
          window.location.assign(universalLink);
        } catch (err) {
          dlog('  method 2 ERROR', err.message);
        }
      } else {
        dlog('app took over (page hidden) — skip method 2');
      }
    }, 500);

    // Fallback to App Store after delay if app didn't intercept
    setTimeout(() => {
      dlog('2000ms check', { hidden: document.hidden, visible: document.visibilityState, elapsed: Date.now() - startTime });
      if (Date.now() - startTime < FALLBACK_DELAY_MS + 500 && !document.hidden && !wasHidden) {
        dlog('FALLBACK: redirecting to App Store');
        if (typeof gtag === 'function') {
          gtag('event', 'share_page_fallback_to_app_store');
        }
        window.location.href = APP_STORE_URL;
      } else {
        dlog('NO fallback — page hidden or elapsed exceeded');
      }
    }, FALLBACK_DELAY_MS);
  });
}

function setupInteractions() {
  // Day accordion (workout days within a block panel)
  document.querySelectorAll('[data-day-toggle]').forEach(header => {
    header.addEventListener('click', () => {
      const group = header.closest('[data-day-group]');
      if (group) group.classList.toggle('open');
    });
  });

  // Block / day tabs
  const tabs = document.querySelectorAll('.block-tab');
  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const idx = tab.getAttribute('data-block-index');
      // Toggle active tab
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      // Show matching panel, hide others
      document.querySelectorAll('[data-block-panel]').forEach(panel => {
        panel.style.display = panel.getAttribute('data-block-panel') === idx ? '' : 'none';
      });
      // Smooth-scroll the panel into view (subtle — only if we're far away)
      const activePanel = document.querySelector(`[data-block-panel="${idx}"]`);
      if (activePanel) {
        const rect = activePanel.getBoundingClientRect();
        if (rect.top < 0 || rect.top > window.innerHeight) {
          activePanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }
    });
  });

  // Expandable rows (exercises / meals) — click row to toggle detail
  document.querySelectorAll('[data-exercise-row]').forEach(row => {
    if (!row.classList.contains('expandable')) return;
    row.addEventListener('click', (e) => {
      // Don't toggle if clicking inside the detail itself (e.g. selecting text)
      if (e.target.closest('[data-exercise-detail]')) return;
      row.classList.toggle('expanded');
    });
  });

  // "+ N more" toggle — show/hide hidden rows
  document.querySelectorAll('[data-toggle-more]').forEach(btn => {
    btn.addEventListener('click', () => {
      const list = btn.closest('[data-day-list]');
      if (!list) return;
      const hiddenContainer = list.querySelector('[data-hidden-rows]');
      if (!hiddenContainer) return;

      const isExpanded = btn.classList.contains('expanded');
      if (isExpanded) {
        // Move hidden rows back into the hidden container
        const detached = Array.from(list.querySelectorAll('[data-detached-row]'));
        detached.forEach(el => {
          el.removeAttribute('data-detached-row');
          hiddenContainer.appendChild(el);
        });
        hiddenContainer.style.display = 'none';
        btn.classList.remove('expanded');
        const count = hiddenContainer.children.length;
        const noun = btn.textContent.includes('meal') ? 'meal' : 'exercise';
        btn.innerHTML = `+ ${count} more ${noun}${count === 1 ? '' : 's'} <span class="chev">▾</span>`;
      } else {
        // Move hidden rows into the main list (just before the toggle button)
        const rowsToMove = Array.from(hiddenContainer.children);
        rowsToMove.forEach(el => {
          el.setAttribute('data-detached-row', 'true');
          list.insertBefore(el, btn);
          // Re-attach expand listener
          if (el.classList && el.classList.contains('expandable')) {
            el.addEventListener('click', (e) => {
              if (e.target.closest('[data-exercise-detail]')) return;
              el.classList.toggle('expanded');
            });
          }
        });
        btn.classList.add('expanded');
        const noun = btn.textContent.includes('meal') ? 'meal' : 'exercise';
        btn.innerHTML = `Show less <span class="chev">▾</span>`;
      }
    });
  });
}

async function fetchShare(shareId) {
  const url = `${API_BASE}/shares/${encodeURIComponent(shareId)}`;
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 10000);

  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);

    if (res.status === 404) {
      const err = new Error('not_found');
      err.code = 'EXPIRED';
      throw err;
    }
    if (!res.ok) {
      const err = new Error('fetch_failed');
      err.code = 'NETWORK';
      throw err;
    }
    return await res.json();
  } catch (err) {
    clearTimeout(timeoutId);
    if (err.name === 'AbortError') {
      const e = new Error('timeout');
      e.code = 'NETWORK';
      throw e;
    }
    throw err;
  }
}

async function init() {
  const shareId = getShareId();

  if (!shareId) {
    showError('Invalid share link', 'This link doesn\'t look right. Ask the sender to share it again.');
    return;
  }

  try {
    const response = await fetchShare(shareId);

    // Backend response shape: { shareId, data: { workoutData/dailyMeals/exportMetadata }, createdAt, expiresAt }
    const payload = response.data || response;
    const inner = payload.workoutData || payload;

    // Determine type
    const type = detectType(inner);

    if (type === 'meal') {
      document.body.classList.add('type-meal');
      document.getElementById('content-inner').innerHTML = renderMealPlan(inner);
    } else {
      document.getElementById('content-inner').innerHTML = renderWorkout(inner);
    }

    setupOpenInAppButton();
    setupInteractions();
    setupDebugPanel();
    showState('state-content');

    if (typeof gtag === 'function') {
      gtag('event', 'share_page_view', { type, shareId });
    }
  } catch (err) {
    if (err.code === 'EXPIRED') {
      showError(
        'This link has expired',
        'Shared links last 7 days. Ask the sender for a new link, or get JSON.fit to share your own.'
      );
    } else {
      showError(
        'Couldn\'t load this share',
        'Check your connection and try again. If the problem continues, the link may be broken.'
      );
    }
  }
}

init();
</script>
