<style>
:root {
  --cyan: #22d3ee;
  --cyan-soft: rgba(34,211,238,0.08);
  --cyan-glow: rgba(34,211,238,0.35);
  --green: #22c55e;
  --amber: #f59e0b;
  --red: #ef4444;
  --bg: #050508;
  --surface: #0a0a0f;
  --surface-2: #111116;
  --border: rgba(255,255,255,0.06);
  --border-cyan: rgba(34,211,238,0.14);
  --text: #f0f0f2;
  --text-2: #9898a4;
  --text-3: #55555f;
}

* , *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { overflow-x: hidden; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Outfit', sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden; line-height: 1.7; font-size: 16px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

.cyan { color: var(--cyan); }
.green { color: var(--green); }

/* ── Nav ── */
nav {
  position: sticky; top: 0; z-index: 100;
  padding: 0 1.5rem; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(5,5,8,0.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  font-family: 'DM Mono', monospace; font-weight: 500; font-size: 1rem;
  color: var(--text); text-decoration: none;
  display: flex; align-items: center; gap: 0.4rem;
}

/* ── Layout ── */
main {
  flex: 1;
  padding: 3rem 1.5rem 4rem;
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
}

@media (max-width: 600px) {
  main { padding: 2rem 1.25rem 3rem; }
}

/* ── States ── */
.state { display: none; }
.state.active { display: block; }

/* ── Loading ── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  gap: 1.25rem; padding: 4rem 1rem;
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  font-family: 'DM Mono', monospace; font-size: 0.75rem;
  color: var(--text-3); letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── Error ── */
.error {
  text-align: center; padding: 3rem 1rem;
}
.error-icon {
  width: 48px; height: 48px;
  margin: 0 auto 1.25rem;
  border-radius: 50%;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  display: flex; align-items: center; justify-content: center;
  color: var(--red);
}
.error h2 {
  font-size: 1.4rem; font-weight: 700;
  letter-spacing: -0.02em; margin-bottom: 0.5rem;
}
.error p {
  color: var(--text-2); font-size: 0.95rem;
  max-width: 360px; margin: 0 auto 1.75rem;
}
.error-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.75rem 1.5rem; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600;
  text-decoration: none; font-family: 'Outfit', sans-serif;
  background: transparent; color: var(--text-2);
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.error-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-soft); }

/* ── Content ── */
.content { animation: fadeUp 0.6s ease both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.share-header {
  text-align: center; margin-bottom: 2rem;
}
.share-label {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.3rem 0.9rem;
  border: 1px solid var(--border-cyan);
  border-radius: 100px;
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem; color: var(--cyan);
  background: var(--cyan-soft);
  letter-spacing: 0.06em; text-transform: uppercase;
  margin-bottom: 1.5rem;
}
.share-label-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }

.share-title {
  font-size: clamp(1.6rem, 4vw, 2.2rem);
  font-weight: 800; letter-spacing: -0.02em;
  line-height: 1.15; margin-bottom: 0.5rem;
}
.share-subtitle {
  color: var(--text-3); font-size: 0.85rem;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
}

/* ── Preview Card ── */
.preview-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 1.5rem;
  position: relative;
}
.preview-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-cyan), transparent);
}

.preview-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--border);
}
.stat {
  background: var(--surface);
  padding: 1.25rem 0.75rem;
  text-align: center;
}
.stat-num {
  font-family: 'DM Mono', monospace;
  font-size: 1.5rem; font-weight: 500;
  color: var(--cyan); line-height: 1;
  letter-spacing: -0.02em;
  margin-bottom: 0.4rem;
}
.stat.green .stat-num { color: var(--green); }
.stat-lbl {
  font-size: 0.72rem; color: var(--text-3);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
}

.preview-body {
  padding: 1.5rem;
}

@media (max-width: 600px) {
  .preview-body { padding: 1.25rem; }
  .stat { padding: 1rem 0.5rem; }
  .stat-num { font-size: 1.25rem; }
  .stat-lbl { font-size: 0.65rem; }
}

.preview-section {
  margin-bottom: 1.25rem;
}
.preview-section:last-child { margin-bottom: 0; }
.preview-section-lbl {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem; color: var(--cyan);
  letter-spacing: 0.16em; text-transform: uppercase;
  margin-bottom: 0.75rem;
}
.preview-section h3 {
  font-size: 0.95rem; font-weight: 700;
  color: var(--text); margin-bottom: 0.5rem;
}
.preview-section p {
  font-size: 0.85rem; color: var(--text-2);
  line-height: 1.65;
}

.preview-list {
  list-style: none; padding: 0;
}
.preview-list li {
  padding: 0.5rem 0;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  gap: 0.75rem;
  font-size: 0.85rem;
}
.preview-list li:last-child { border-bottom: none; }
.preview-list .item-name {
  color: var(--text); font-weight: 500;
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.preview-list .item-meta {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem; color: var(--text-3);
  flex-shrink: 0;
}

.preview-more {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem; color: var(--text-3);
  text-align: center; padding: 0.75rem 0;
  letter-spacing: 0.06em;
}

/* ── CTA ── */
.cta-section {
  margin-top: 2rem; text-align: center;
}
.cta-btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.5rem; width: 100%;
  padding: 1rem 2rem; border-radius: 12px;
  font-size: 1rem; font-weight: 700;
  text-decoration: none; font-family: 'Outfit', sans-serif;
  background: var(--cyan); color: #000;
  border: none; cursor: pointer;
  transition: transform 0.25s, box-shadow 0.25s;
  margin-bottom: 1rem;
}
.cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--cyan-glow); }

.cta-divider {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 1.5rem 0 1.25rem;
  color: var(--text-3);
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem; letter-spacing: 0.08em;
  text-transform: uppercase;
}
.cta-divider::before, .cta-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.cta-secondary-text {
  font-size: 0.85rem; color: var(--text-2);
  margin-bottom: 1rem;
}

.app-store-link {
  display: inline-block;
  transition: transform 0.2s, opacity 0.2s;
}
.app-store-link:hover { transform: translateY(-1px); opacity: 0.9; }
.app-store-link img {
  height: 44px; display: block; border-radius: 8px;
}

.android-text {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem; color: var(--text-3);
  letter-spacing: 0.04em; margin-top: 0.75rem;
}

.cta-foot {
  font-family: 'DM Mono', monospace;
  font-size: 0.68rem; color: var(--text-3);
  letter-spacing: 0.04em; margin-top: 1.5rem;
}

/* ── Footer ── */
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem; text-align: center;
}
.foot-l {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem; color: var(--text-3);
}
.foot-l a {
  color: var(--text-3); text-decoration: none;
  margin: 0 0.75rem; transition: color 0.2s;
}
.foot-l a:hover { color: var(--cyan); }

/* ── Type-specific accents ── */
.type-meal .share-label,
.type-meal .preview-card::before {
  border-color: rgba(34,197,94,0.2);
  color: var(--green);
  background: rgba(34,197,94,0.05);
}
.type-meal .preview-section-lbl { color: var(--green); }
.type-meal .stat-num { color: var(--green); }
.type-meal .share-label-dot { background: var(--green); }
.type-meal .preview-card::before {
  background: linear-gradient(90deg, transparent, rgba(34,197,94,0.2), transparent);
}
</style>

<nav>

    <svg width="18" height="12" viewBox="0 0 22 14" fill="none">

    JSON<span class="cyan">.fit</span>

<main>

  <!-- LOADING STATE -->
  <div class="state active" id="state-loading">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Loading shared content</div>
    </div>
  </div>

  <!-- ERROR STATE -->
  <div class="state" id="state-error">
    <div class="error">
      <div class="error-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h2 id="error-title">This link has expired</h2>
      <p id="error-msg">Shared links last 7 days. Ask the sender for a new link, or get JSON.fit to share your own.</p>
      <a href="https://json.fit" class="error-btn">
        Visit JSON.fit
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>
  </div>

  <!-- CONTENT STATE -->
  <div class="state" id="state-content">
    <div class="content" id="content-inner"></div>
  </div>

</main>

<footer>
  <div class="foot-l">
    <a href="https://json.fit">json.fit</a>
    <a href="https://json.fit/privacy-policy.html">Privacy</a>
    <a href="https://json.fit/terms-of-service.html">Terms</a>
  </div>
</footer>

<script>
const API_BASE = 'https://eb6x42gp3h.execute-api.ap-southeast-2.amazonaws.com';
const APP_STORE_URL = 'https://apps.apple.com/au/app/json-fit/id6758357834';
const FALLBACK_DELAY_MS = 2000;

// Extract shareId from URL path /p/{shareId}
function getShareId() {
  const match = window.location.pathname.match(/\/p\/([A-Za-z0-9_-]+)/);
  return match ? match[1] : null;
}

function showState(stateId) {
  document.querySelectorAll('.state').forEach(el => el.classList.remove('active'));
  document.getElementById(stateId).classList.add('active');
}

function showError(title, msg) {
  document.getElementById('error-title').textContent = title;
  document.getElementById('error-msg').textContent = msg;
  showState('state-error');
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// Detect content type from the data shape
function detectType(data) {
  // Workout shape: routine_name, days_per_week, blocks
  if (data.routine_name || data.days_per_week !== undefined || (Array.isArray(data.blocks) && data.blocks[0]?.block_name)) {
    return 'workout';
  }
  // Meal plan shape: dailyMeals, startDate, name with meals
  if (data.dailyMeals || data.startDate || (data.name && /meal|nutrition|calories/i.test(JSON.stringify(data).slice(0, 500)))) {
    return 'meal';
  }
  // Default to workout for unknown shapes
  return 'workout';
}

function renderWorkout(data) {
  const name = data.routine_name || data.name || 'Shared Workout';
  const description = data.description || '';
  const daysPerWeek = data.days_per_week || data.training_days || (data.blocks && data.blocks[0]?.weekly_schedule?.length) || 0;
  const blocks = data.blocks || [];

  // Count total weeks from first block (if it has weeks like "1-4")
  let totalWeeks = 0;
  if (blocks[0]?.weeks) {
    const match = String(blocks[0].weeks).match(/(\d+)\s*-\s*(\d+)/);
    if (match) totalWeeks = parseInt(match[2]);
    else totalWeeks = parseInt(blocks[0].weeks) || 0;
  }

  // Get first block's first non-rest day for preview
  const firstBlock = blocks[0];
  let previewDay = null;
  let previewDayName = '';
  if (firstBlock?.days) {
    for (const day of firstBlock.days) {
      if (day.exercises && day.exercises.length > 0) {
        previewDay = day;
        previewDayName = day.day_name || 'Day 1';
        break;
      }
    }
  }

  let exercisesHtml = '';
  if (previewDay) {
    const exercises = previewDay.exercises.slice(0, 4);
    const more = previewDay.exercises.length - exercises.length;
    exercisesHtml = `
      <div class="preview-section">
        <div class="preview-section-lbl">Preview · ${escapeHtml(previewDayName)}</div>
        <ul class="preview-list">
          ${exercises.map(ex => `
            <li>
              <span class="item-name">${escapeHtml(ex.exercise || ex.name || 'Exercise')}</span>
              <span class="item-meta">${escapeHtml(String(ex.sets || ''))}${ex.sets ? ' × ' : ''}${escapeHtml(String(ex.reps || ''))}</span>
            </li>
          `).join('')}
        </ul>
        ${more > 0 ? `<div class="preview-more">+ ${more} more exercise${more === 1 ? '' : 's'}</div>` : ''}
      </div>
    `;
  }

  const stats = [];
  if (daysPerWeek) stats.push({ num: daysPerWeek, lbl: 'days/week' });
  if (totalWeeks) stats.push({ num: totalWeeks + 'wk', lbl: 'program' });
  if (blocks.length) stats.push({ num: blocks.length, lbl: blocks.length === 1 ? 'block' : 'blocks' });

  return `
    <div class="share-header">
      <div class="share-label">
        <span class="share-label-dot"></span>
        Workout shared with you
      </div>
      <h1 class="share-title">${escapeHtml(name)}</h1>
      <p class="share-subtitle">Open in JSON.fit to import</p>
    </div>

    <div class="preview-card">
      ${stats.length ? `
        <div class="preview-stats">
          ${stats.map(s => `
            <div class="stat">
              <div class="stat-num">${escapeHtml(String(s.num))}</div>
              <div class="stat-lbl">${escapeHtml(s.lbl)}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div class="preview-body">
        ${description ? `
          <div class="preview-section">
            <div class="preview-section-lbl">About</div>
            <p>${escapeHtml(description)}</p>
          </div>
        ` : ''}
        ${exercisesHtml}
      </div>
    </div>

    ${renderCTA('workout')}
  `;
}

function renderMealPlan(data) {
  const name = data.name || 'Shared Meal Plan';
  const dailyMeals = data.dailyMeals || {};
  const days = Object.keys(dailyMeals).sort();
  const dayCount = days.length;

  // Compute average daily macros from the first day
  let avgKcal = 0, avgProtein = 0;
  if (days.length > 0) {
    const firstDay = dailyMeals[days[0]];
    const meals = firstDay?.meals || [];
    avgKcal = meals.reduce((sum, m) => sum + (m.calories || 0), 0);
    avgProtein = meals.reduce((sum, m) => sum + (m.macros?.protein || 0), 0);
  }

  // Preview meals from the first day
  let mealsHtml = '';
  if (days.length > 0) {
    const firstDay = dailyMeals[days[0]];
    const meals = (firstDay?.meals || []).slice(0, 4);
    const more = (firstDay?.meals || []).length - meals.length;
    if (meals.length > 0) {
      mealsHtml = `
        <div class="preview-section">
          <div class="preview-section-lbl">Preview · ${escapeHtml(firstDay.dayName || 'Day 1')}</div>
          <ul class="preview-list">
            ${meals.map(m => `
              <li>
                <span class="item-name">${escapeHtml(m.name || m.type || 'Meal')}</span>
                <span class="item-meta">${m.calories ? Math.round(m.calories) + ' kcal' : ''}</span>
              </li>
            `).join('')}
          </ul>
          ${more > 0 ? `<div class="preview-more">+ ${more} more meal${more === 1 ? '' : 's'}</div>` : ''}
        </div>
      `;
    }
  }

  const stats = [];
  if (dayCount) stats.push({ num: dayCount, lbl: dayCount === 1 ? 'day' : 'days' });
  if (avgKcal) stats.push({ num: Math.round(avgKcal).toLocaleString(), lbl: 'kcal/day' });
  if (avgProtein) stats.push({ num: Math.round(avgProtein) + 'g', lbl: 'protein' });

  return `
    <div class="share-header">
      <div class="share-label">
        <span class="share-label-dot"></span>
        Meal plan shared with you
      </div>
      <h1 class="share-title">${escapeHtml(name)}</h1>
      <p class="share-subtitle">Open in JSON.fit to import</p>
    </div>

    <div class="preview-card">
      ${stats.length ? `
        <div class="preview-stats">
          ${stats.map(s => `
            <div class="stat green">
              <div class="stat-num">${escapeHtml(String(s.num))}</div>
              <div class="stat-lbl">${escapeHtml(s.lbl)}</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
      <div class="preview-body">
        ${mealsHtml}
      </div>
    </div>

    ${renderCTA('meal')}
  `;
}

function renderCTA(type) {
  return `
    <div class="cta-section">
      <button class="cta-btn" id="open-in-app-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Open in JSON.fit
      </button>

      <div class="cta-divider">Don't have the app?</div>

      <p class="cta-secondary-text">Get JSON.fit free to import this ${type === 'meal' ? 'meal plan' : 'workout'}.</p>

      <a href="${APP_STORE_URL}" class="app-store-link" onclick="gtag('event','share_page_app_store_click',{type:'${type}'})">
        <img src="https://json.fit/images/App_Store.svg" alt="Download on the App Store" onerror="this.outerHTML='<span style=&quot;display:inline-block;padding:0.75rem 1.5rem;border:1px solid var(--border);border-radius:10px;color:var(--text);font-weight:600;font-size:0.9rem;&quot;>Download on the App Store</span>'">
      </a>

      <div class="android-text">Android coming soon</div>

      <div class="cta-foot">Free workouts forever · No subscription</div>
    </div>
  `;
}

function setupOpenInAppButton() {
  const btn = document.getElementById('open-in-app-btn');
  if (!btn) return;

  btn.addEventListener('click', (e) => {
    e.preventDefault();
    const startTime = Date.now();
    const wasHidden = document.hidden;

    // Track click
    if (typeof gtag === 'function') {
      gtag('event', 'share_page_open_in_app_click');
    }

    // Try to open the universal link (current URL is the universal link)
    const universalLink = window.location.href;

    // Set up fallback to App Store
    setTimeout(() => {
      if (Date.now() - startTime < FALLBACK_DELAY_MS + 500 && !document.hidden && !wasHidden) {
        if (typeof gtag === 'function') {
          gtag('event', 'share_page_fallback_to_app_store');
        }
        window.location.href = APP_STORE_URL;
      }
    }, FALLBACK_DELAY_MS);

    // Trigger the universal link
    window.location.href = universalLink;
  });
}

async function fetchShare(shareId) {
  const url = `${API_BASE}/shares/${encodeURIComponent(shareId)}`;
  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 10000);

  try {
    const res = await fetch(url, { signal: controller.signal });
    clearTimeout(timeoutId);

    if (res.status === 404) {
      const err = new Error('not_found');
      err.code = 'EXPIRED';
      throw err;
    }
    if (!res.ok) {
      const err = new Error('fetch_failed');
      err.code = 'NETWORK';
      throw err;
    }
    return await res.json();
  } catch (err) {
    clearTimeout(timeoutId);
    if (err.name === 'AbortError') {
      const e = new Error('timeout');
      e.code = 'NETWORK';
      throw e;
    }
    throw err;
  }
}

async function init() {
  const shareId = getShareId();

  if (!shareId) {
    showError('Invalid share link', 'This link doesn\'t look right. Ask the sender to share it again.');
    return;
  }

  try {
    const response = await fetchShare(shareId);

    // Backend response shape: { shareId, data: { workoutData/dailyMeals/exportMetadata }, createdAt, expiresAt }
    const payload = response.data || response;
    const inner = payload.workoutData || payload;

    // Determine type
    const type = detectType(inner);

    if (type === 'meal') {
      document.body.classList.add('type-meal');
      document.getElementById('content-inner').innerHTML = renderMealPlan(inner);
    } else {
      document.getElementById('content-inner').innerHTML = renderWorkout(inner);
    }

    setupOpenInAppButton();
    showState('state-content');

    if (typeof gtag === 'function') {
      gtag('event', 'share_page_view', { type, shareId });
    }
  } catch (err) {
    if (err.code === 'EXPIRED') {
      showError(
        'This link has expired',
        'Shared links last 7 days. Ask the sender for a new link, or get JSON.fit to share your own.'
      );
    } else {
      showError(
        'Couldn\'t load this share',
        'Check your connection and try again. If the problem continues, the link may be broken.'
      );
    }
  }
}

init();
</script>
