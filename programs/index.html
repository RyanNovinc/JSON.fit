<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Program — JSON.fit</title>
<meta name="description" content="A complete, periodised training program ready to import into JSON.fit. Free.">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --cyan:#22d3ee; --cyan-soft:rgba(34,211,238,0.08); --cyan-glow:rgba(34,211,238,0.32); --border-cyan:rgba(34,211,238,0.18);
  --green:#22c55e;
  --bg:#050508; --surface:#0a0a0f; --surface-2:#111116;
  --border:rgba(255,255,255,0.06);
  --text:#f0f0f2; --text-2:#9898a4; --text-3:#55555f;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{overflow-x:hidden;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6;font-size:16px;min-height:100vh;display:flex;flex-direction:column}
.cyan{color:var(--cyan)}
.wrap{max-width:860px;margin:0 auto;width:100%;padding:0 1.5rem}

nav{position:sticky;top:0;z-index:100;padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,8,0.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-left{display:flex;align-items:center;gap:.6rem}
.nav-back{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;border:1px solid var(--border);color:var(--text-2);text-decoration:none;transition:border-color .2s,color .2s;flex-shrink:0}
.nav-back:hover{border-color:var(--border-cyan);color:var(--cyan)}
.nav-logo{font-family:'DM Mono',monospace;font-weight:500;font-size:1rem;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:.4rem}
.nav-cta{background:var(--cyan);color:#000;padding:.4rem 1rem;border-radius:8px;font-weight:600;font-size:.78rem;text-decoration:none}

main{flex:1;padding:2.25rem 0 3rem}

/* states */
.loading,.error{display:flex;flex-direction:column;align-items:center;gap:1.1rem;padding:5rem 1.5rem;text-align:center}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text,.error p{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-3);letter-spacing:.06em}
.error h2{font-size:1.2rem;font-weight:700}
.error a{color:var(--cyan);text-decoration:none}

/* detail */
.d-split{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);margin-bottom:.5rem}
#title{font-size:clamp(1.7rem,4.5vw,2.6rem);font-weight:800;letter-spacing:-.03em;line-height:1.08;margin-bottom:.4rem}
#subtitle{color:var(--text-3);font-family:'DM Mono',monospace;font-size:.72rem;margin-bottom:1rem}
.d-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.d-tag{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--cyan);padding:.25rem .6rem;border:1px solid var(--border-cyan);border-radius:5px;background:var(--cyan-soft)}
#desc{color:var(--text-2);font-size:.92rem;line-height:1.7;margin-bottom:1.5rem}

/* listing (shown when no ?program= is set) */
.list-head{margin-bottom:1.9rem}
.list-head #desc{margin-bottom:0;max-width:620px}
.plist{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem}
.pcard{display:flex;flex-direction:column;text-decoration:none;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.4rem;transition:border-color .2s,transform .2s}
.pcard:hover{border-color:var(--border-cyan);transform:translateY(-3px)}
.pc-title{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;margin:.15rem 0 .9rem;line-height:1.12}
.pc-bar{display:flex;gap:3px;height:8px;margin-bottom:1rem}
.pseg{flex:1;border-radius:3px;background:linear-gradient(180deg,#2ee0f5,#0e7490)}
.pc-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.1rem}
.pc-open{margin-top:auto;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--cyan);display:inline-flex;align-items:center;gap:.35rem;font-weight:500}
.import-row{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:2.5rem}
.import-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 1.75rem;border-radius:12px;font-size:.98rem;font-weight:700;background:var(--cyan);color:#000;border:none;cursor:pointer;font-family:'Outfit',sans-serif;transition:transform .2s,box-shadow .2s}
.import-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--cyan-glow)}
.import-note{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--text-3)}

.block{padding:1.75rem 0;border-top:1px solid var(--border)}
.block-lbl{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin-bottom:.25rem}
.block h3{font-size:1.05rem;font-weight:700;margin-bottom:1rem;letter-spacing:-.01em}
.block h3 .sub{font-weight:400;color:var(--text-3);font-size:.8rem;font-family:'DM Mono',monospace;margin-left:.4rem}

/* timeline */
.timeline{display:flex;gap:10px;margin-bottom:.85rem;align-items:stretch}
.phase{display:flex;flex-direction:column;gap:.45rem;min-width:0}
.phase-name{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.4rem;letter-spacing:.01em}
.phase-no{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:4px;background:var(--cyan-soft);border:1px solid var(--border-cyan);color:var(--cyan);font-size:.56rem;flex-shrink:0}
.phase-bar{height:42px;border-radius:7px;overflow:hidden;display:flex;gap:2px;background:var(--surface-2)}
.subblock{flex:1;min-width:5px;background:linear-gradient(180deg,#2ee0f5,#0e7490);position:relative}
.subblock .dl{position:absolute;right:0;top:0;bottom:0;width:18%;min-width:7px;background:repeating-linear-gradient(45deg,rgba(5,5,8,0.15),rgba(5,5,8,0.15) 2px,rgba(5,5,8,0.5) 2px,rgba(5,5,8,0.5) 4px);border-left:1px solid rgba(5,5,8,0.55)}
.phase-cap{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-legend{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--text-3);display:flex;gap:1.25rem;flex-wrap:wrap}
.tl-legend span{display:inline-flex;align-items:center;gap:.4rem}
.lg-dot{width:9px;height:9px;border-radius:2px;background:linear-gradient(180deg,#2ee0f5,#0e7490)}
.lg-dl{width:9px;height:9px;border-radius:2px;background:repeating-linear-gradient(45deg,rgba(5,5,8,0.15),rgba(5,5,8,0.15) 2px,rgba(255,255,255,0.25) 2px,rgba(255,255,255,0.25) 4px);border:1px solid var(--border)}

/* volume */
.vol{display:flex;flex-direction:column;gap:.55rem}
.vol-row{display:flex;align-items:center;gap:.8rem}
.vol-name{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--text-2);width:108px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vol-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.vol-bar{height:100%;border-radius:3px;background:var(--cyan)}
.vol-sets{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--cyan);width:54px;text-align:right;flex-shrink:0}
.vol-note{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-3);margin-top:.75rem;letter-spacing:.02em}

/* sample week */
.week{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
.day{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:1rem 1.1rem;display:flex;flex-direction:column;gap:.5rem}
.day.rest{opacity:.55}
.day-top{display:flex;align-items:baseline;justify-content:space-between;gap:.5rem}
.day-name{font-size:.92rem;font-weight:700}
.day-num{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--text-3)}
.day-ex{list-style:none;display:flex;flex-direction:column;gap:.3rem}
.day-ex li{font-size:.78rem;color:var(--text-2);display:flex;justify-content:space-between;gap:.5rem}
.day-ex li span{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--cyan);flex-shrink:0}
.day-more{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--text-3)}

/* screenshots */
.shots{display:flex;gap:1.25rem;flex-wrap:wrap;align-items:flex-start}
.phone{width:160px;flex-shrink:0}
.phone-frame{aspect-ratio:9/19.5;border-radius:24px;border:2px solid var(--border-cyan);background:linear-gradient(160deg,rgba(34,211,238,0.07),var(--surface-2) 70%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.phone-frame::before{content:'';position:absolute;top:9px;left:50%;transform:translateX(-50%);width:42px;height:5px;border-radius:3px;background:rgba(255,255,255,0.12)}
.phone-slot{border:1px dashed var(--border-cyan);border-radius:10px;padding:1rem;margin:1.4rem .8rem;font-family:'DM Mono',monospace;font-size:.56rem;color:var(--text-3);text-align:center;line-height:1.7}
.phone-cap{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--cyan);letter-spacing:.06em;text-transform:uppercase;text-align:center;margin-top:.6rem}
.shots-note{flex:1;min-width:200px;color:var(--text-2);font-size:.85rem;line-height:1.7}
.shots-note strong{color:var(--text);font-weight:600}

.foot-cta{text-align:center;padding:2.5rem 0 1rem}
.foot-cta .import-btn{margin:0 auto}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface-2);color:var(--text);border:1px solid var(--border-cyan);padding:.8rem 1.25rem;border-radius:10px;font-size:.85rem;z-index:200;opacity:0;transition:all .35s ease;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

footer{border-top:1px solid var(--border);padding:1.5rem;text-align:center}
.foot-l{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--text-3)}
.foot-l a{color:var(--text-3);text-decoration:none;margin:0 .75rem}
.foot-l a:hover{color:var(--cyan)}

@media(max-width:560px){.week{grid-template-columns:1fr}.timeline{flex-direction:column;gap:1rem}.phase{width:100%}.phase-bar{height:34px}.phase-name{font-size:.72rem}}
</style>
</head>

    </a>

      <svg width="18" height="12" viewBox="0 0 22 14" fill="none"><rect x="0" y="3" width="4" height="8" rx="1.5" fill="#22d3ee"/><rect x="18" y="3" width="4" height="8" rx="1.5" fill="#22d3ee"/><rect x="4" y="5" width="14" height="4" rx="2" fill="#22d3ee"/></svg>
      JSON<span class="cyan">.fit</span>
    </a>
  </div>
  <a href="https://apps.apple.com/au/app/json-fit/id6758357834" class="nav-cta">Get the app</a>

<main>
  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">Loading program…</div></div>
  <div class="error" id="error" style="display:none">
    <h2>Program not found.</h2>
    <p id="error-detail">We couldn't load this program.</p>
    <p><a href="/#programs">← Back to all programs</a></p>
  </div>
  <div class="wrap" id="content" style="display:none"></div>
</main>

<footer>
  <div class="foot-l">
    <a href="https://json.fit">json.fit</a>
    <a href="/#programs">Programs</a>
    <a href="https://json.fit/meals.html">Meals</a>
    <a href="https://json.fit/privacy-policy.html">Privacy</a>
  </div>
</footer>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var slug = (params.get('program') || '').replace(/[^a-z0-9-]/gi,'');
  var FILE = '/programs/' + slug + '.json';

  // Manifest for the listing view (shown when no ?program= is set). Small + fast;
  // the heavy per-program JSON is only fetched on the detail view. Keep names/slugs
  // in sync with the homepage cards and the /programs/<slug>.json filenames.
  var PROGRAMS = [
    { slug:'upper-lower-beginner', name:'Beginner Foundation',  split:'Upper / Lower',    level:'Beginner',     weeks:52, days:4 },
    { slug:'ppl-upper-lower',      name:'Intermediate Hybrid',  split:'PPL + Upper/Lower', level:'Intermediate', weeks:54, days:5 },
    { slug:'ppl-advanced',         name:'Advanced High-Volume', split:'Push/Pull/Legs ×2', level:'Advanced',     weeks:52, days:6 },
  ];

  var loadingEl = document.getElementById('loading');
  var errorEl = document.getElementById('error');
  var contentEl = document.getElementById('content');

  // Detail view goes back to the listing; the listing goes back to the homepage.
  var backEl = document.querySelector('.nav-back');
  if(backEl){
    backEl.setAttribute('href', slug ? '/programs' : '/');
    backEl.setAttribute('aria-label', slug ? 'Back to all programs' : 'Back to JSON.fit');
  }

  function showError(msg){
    loadingEl.style.display='none';
    if(msg) document.getElementById('error-detail').textContent = msg;
    errorEl.style.display='flex';
  }

  // ---- helpers (per the JSON.fit program format spec) ----
  function esc(s){ if(s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function rangeEnd(str){ // "19-24" -> 24 ; "48-52" -> 52
    var m = String(str||'').match(/(\d+)\s*$/);
    return m ? parseInt(m[1],10) : 0;
  }
  function rangeStart(str){
    var m = String(str||'').match(/^\s*(\d+)/);
    return m ? parseInt(m[1],10) : 0;
  }
  function totalWeeks(blocks){
    return blocks.reduce(function(mx,b){ return Math.max(mx, rangeEnd(b.weeks)); }, 0);
  }
  function deriveLevel(desc){
    var m = String(desc||'').match(/\b(beginner|intermediate|advanced)\b/i);
    return m ? m[1].charAt(0).toUpperCase()+m[1].slice(1).toLowerCase() : '';
  }
  function titleParts(name){ // split off any " — Mesocycle …" suffix for the subtitle
    var s = String(name||'Program');
    var idx = s.indexOf('—');
    if(idx === -1) idx = s.indexOf(' - ');
    if(idx > -1) return { title: s.slice(0,idx).trim(), sub: s.slice(idx+1).replace(/^[—-]\s*/,'').trim() };
    return { title: s.trim(), sub: '' };
  }
  function firstTrainingBlock(blocks){ return blocks[0] || {}; }
  function firstWeekKey(ex){ // smallest numeric week key present
    var keys = Object.keys(ex.sets_weekly || ex.reps_weekly || {});
    keys = keys.map(Number).filter(function(n){return !isNaN(n);}).sort(function(a,b){return a-b;});
    return keys.length ? String(keys[0]) : null;
  }

  function render(data){
    try{
      var blocks = Array.isArray(data.blocks) ? data.blocks : [];
      if(!blocks.length){ showError('This program file has no blocks.'); return; }

      var tp = titleParts(data.routine_name);
      var split = (blocks[0] && blocks[0].structure) || 'Training';
      var weeks = totalWeeks(blocks);
      var level = deriveLevel(data.description);
      // days_per_week is the 7-day schedule length, NOT training days.
      // Training days = weekly_schedule entries with type "training" (block 1 as representative).
      var ws = (blocks[0] && Array.isArray(blocks[0].weekly_schedule)) ? blocks[0].weekly_schedule : [];
      var dpw = ws.filter(function(e){ return e && e.type === 'training'; }).length;
      if(!dpw && data.days_per_week && data.days_per_week < 7) dpw = data.days_per_week;

      var html = '';
      // ---- header ----
      html += '<div class="d-split">'+esc(split)+'</div>';
      html += '<h1 id="title">'+esc(tp.title)+'</h1>';
      if(tp.sub) html += '<div id="subtitle">'+esc(tp.sub)+'</div>';
      html += '<div class="d-tags">';
      html += '<span class="d-tag">'+esc(split)+'</span>';
      if(weeks) html += '<span class="d-tag">'+weeks+' weeks</span>';
      if(dpw) html += '<span class="d-tag">'+esc(dpw)+' days/week</span>';
      if(level) html += '<span class="d-tag">'+esc(level)+'</span>';
      html += '<span class="d-tag">'+blocks.length+' blocks</span>';
      html += '</div>';
      if(data.description) html += '<p id="desc">'+esc(data.description)+'</p>';
      var importNote = 'free · opens straight in the app';
      html += '<div class="import-row"><button class="import-btn" id="importTop">'
            + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
            + 'Import this program</button><span class="import-note">'+importNote+'</span></div>';

      // ---- periodization timeline (grouped into mesocycle phases) ----
      // 9 blocks render as 9 cramped boxes; they're really 3 mesocycles of 3 blocks.
      // Group consecutive blocks that share a mesocycle number (or, failing that, a theme name).
      function phaseTheme(name){
        return String(name||'')
          .replace(/^Block\s*\d+\s*/i,'')      // drop "Block 4 "
          .replace(/\([^)]*\)/g,'')             // drop "(Mesocycle 2, Block 1)"
          .replace(/^[—\-:\s]+/,'').trim() || 'Phase';
      }
      function phaseKey(b){
        var m = String(b.block_name||'').match(/Mesocycle\s*(\d+)/i);
        return m ? ('M'+m[1]) : phaseTheme(b.block_name);
      }
      var phases = [];
      blocks.forEach(function(b){
        var k = phaseKey(b), last = phases[phases.length-1];
        if(last && last.key === k){ last.blocks.push(b); }
        else { phases.push({ key:k, theme:phaseTheme(b.block_name), blocks:[b] }); }
      });
      var anyDeload = false;
      html += '<div class="block"><div class="block-lbl">How it\'s structured</div><h3>Periodised over '+weeks+' weeks<span class="sub">'+phases.length+' phases · '+blocks.length+' blocks</span></h3>';
      html += '<div class="timeline">';
      phases.forEach(function(p,pi){
        var pStart = rangeStart(p.blocks[0].weeks);
        var pEnd = rangeEnd(p.blocks[p.blocks.length-1].weeks);
        var pSpan = Math.max(1, pEnd - pStart + 1);
        var subs = '';
        p.blocks.forEach(function(b){
          var span = Math.max(1, rangeEnd(b.weeks) - rangeStart(b.weeks) + 1);
          var hasDeload = Array.isArray(b.deload_weeks) && b.deload_weeks.length > 0;
          if(hasDeload) anyDeload = true;
          subs += '<div class="subblock" style="flex:'+span+'" title="'+esc(b.block_name||'')+'">'+(hasDeload?'<span class="dl"></span>':'')+'</div>';
        });
        html += '<div class="phase" style="flex:'+pSpan+'">'
              + '<div class="phase-name"><span class="phase-no">'+(pi+1)+'</span>'+esc(p.theme)+'</div>'
              + '<div class="phase-bar">'+subs+'</div>'
              + '<div class="phase-cap">Wk '+pStart+'–'+pEnd+' · '+p.blocks.length+' blocks</div>'
              + '</div>';
      });
      html += '</div>';
      html += '<div class="tl-legend"><span><span class="lg-dot"></span> Training</span>'+(anyDeload?'<span><span class="lg-dl"></span> Deload week</span>':'')+'</div>';
      html += '</div>';

      // ---- volume bars (effective sets, representative week of block 1) ----
      var b1 = firstTrainingBlock(blocks);
      var days = Array.isArray(b1.days) ? b1.days : [];
      var muscle = {}; // name -> effective sets
      var wkUsed = null;
      days.forEach(function(d){
        if(!d || !Array.isArray(d.exercises)) return;
        d.exercises.forEach(function(ex){
          var wk = firstWeekKey(ex); if(!wk) return;
          if(!wkUsed) wkUsed = wk;
          var n = (ex.sets_weekly && ex.sets_weekly[wk] != null) ? Number(ex.sets_weekly[wk]) : Number(ex.sets||0);
          if(!n) return;
          (ex.primaryMuscles||[]).forEach(function(m){ muscle[m]=(muscle[m]||0)+n; });
          (ex.secondaryMuscles||[]).forEach(function(m){ muscle[m]=(muscle[m]||0)+n*0.5; });
        });
      });
      var rows = Object.keys(muscle).map(function(m){ return {m:m, v:muscle[m]}; }).sort(function(a,b){ return b.v-a.v; });
      if(rows.length){
        var mx = rows[0].v || 1;
        html += '<div class="block"><div class="block-lbl">Weekly volume</div><h3>Effective sets per muscle<span class="sub">a working week</span></h3><div class="vol">';
        rows.forEach(function(r){
          var sets = Math.round(r.v*10)/10;
          html += '<div class="vol-row"><span class="vol-name">'+esc(r.m)+'</span><div class="vol-wrap"><div class="vol-bar" style="width:'+(r.v/mx*100)+'%"></div></div><span class="vol-sets">'+sets+' sets</span></div>';
        });
        html += '</div><div class="vol-note">Effective sets = primary muscles ×1 + secondary ×0.5. Reflects '+(b1.block_name?esc(String(b1.block_name).replace(/—.*/,'').trim()):'block 1')+', week '+(wkUsed||'1')+'.</div></div>';
      }

      // ---- sample week ----
      html += '<div class="block"><div class="block-lbl">A sample week</div><h3>One week from the program<span class="sub">full set/rep/RIR targets in the app</span></h3><div class="week">';
      days.forEach(function(d,i){
        if(!d){ return; }
        var isRest = (d.day_name === 'REST DAY') || !Array.isArray(d.exercises) || d.exercises.length===0;
        if(isRest){
          html += '<div class="day rest"><div class="day-top"><span class="day-name">Rest</span><span class="day-num">Day '+(i+1)+'</span></div></div>';
          return;
        }
        html += '<div class="day"><div class="day-top"><span class="day-name">'+esc(d.day_name||('Day '+(i+1)))+'</span><span class="day-num">Day '+(i+1)+'</span></div><ul class="day-ex">';
        var show = d.exercises.slice(0,4);
        show.forEach(function(ex){
          var wk = firstWeekKey(ex);
          var sets = (ex.sets_weekly && wk!=null && ex.sets_weekly[wk]!=null) ? ex.sets_weekly[wk] : (ex.sets||'');
          var reps = ex.reps || '';
          html += '<li>'+esc(ex.exercise||'Exercise')+'<span>'+esc(sets)+(reps?(' × '+esc(reps)):'')+'</span></li>';
        });
        html += '</ul>';
        if(d.exercises.length>4) html += '<span class="day-more">+ '+(d.exercises.length-4)+' more</span>';
        html += '</div>';
      });
      html += '</div></div>';

      // ---- in-app screenshots ----
      html += '<div class="block"><div class="block-lbl">How it looks in the app</div><h3>Train it set-by-set</h3><div class="shots">'
            + '<div class="phone"><div class="phone-frame"><div class="phone-slot">in-app screenshot<br>— exercise screen —<br><br>(form demo + sets)</div></div><div class="phone-cap">Exercise view</div></div>'
            + '<div class="phone"><div class="phone-frame"><div class="phone-slot">in-app screenshot<br>— your week —</div></div><div class="phone-cap">Your week</div></div>'
            + '<p class="shots-note">Once imported, every exercise comes with a <strong>form demo</strong>, set/rep/RIR targets, rest timers and swap options. The full '+weeks+' weeks live in the app — this page is the preview.</p>'
            + '</div></div>';

      // ---- footer import ----
      html += '<div class="foot-cta"><button class="import-btn" id="importBottom">'
            + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
            + 'Import this program</button></div>';

      contentEl.innerHTML = html;
      loadingEl.style.display='none';
      contentEl.style.display='block';
      document.title = tp.title + ' — JSON.fit';

      // ---- import action ----------------------------------------------------
      // Same mechanism as the /p/ share page: navigate to the curated program's
      // universal link (json.fit/p/program/<slug>). On iOS the app intercepts it
      // (associated domain) and imports directly — it fetches /programs/<slug>.json
      // itself, so nothing heavy travels in the URL. If the app never takes over
      // (not installed / desktop), fall back to the App Store after a short delay.
      var APP_STORE_URL = 'https://apps.apple.com/au/app/json-fit/id6758357834';
      var FALLBACK_DELAY_MS = 2000;
      function doImport(){
        var universalLink = 'https://json.fit/p/program/' + slug;
        var startTime = Date.now();
        var wasHidden = document.hidden;
        if(typeof gtag === 'function') gtag('event','import_program',{program:slug});

        // Method 1: anchor click — iOS catches associated-domain links here.
        try{
          var a = document.createElement('a');
          a.href = universalLink; a.rel = 'noopener';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }catch(e){}

        // Method 2: direct assignment shortly after, if the app hasn't taken over.
        setTimeout(function(){
          if(!document.hidden){ try{ window.location.assign(universalLink); }catch(e){} }
        }, 500);

        // Fallback: App Store, if we're still on the page after the delay.
        setTimeout(function(){
          if(Date.now() - startTime < FALLBACK_DELAY_MS + 500 && !document.hidden && !wasHidden){
            if(typeof gtag === 'function') gtag('event','import_program_fallback_app_store',{program:slug});
            window.location.href = APP_STORE_URL;
          }
        }, FALLBACK_DELAY_MS);
      }
      var t1=document.getElementById('importTop'), t2=document.getElementById('importBottom');
      if(t1) t1.addEventListener('click',doImport);
      if(t2) t2.addEventListener('click',doImport);

    }catch(err){
      console.error(err);
      showError('Something went wrong parsing this program.');
    }
  }

  function renderList(){
    var cards = PROGRAMS.map(function(p){
      return '<a class="pcard" href="/programs/?program='+p.slug+'">'
        + '<div class="d-split">'+esc(p.split)+'</div>'
        + '<h3 class="pc-title">'+esc(p.name)+'</h3>'
        + '<div class="pc-bar"><span class="pseg"></span><span class="pseg"></span><span class="pseg"></span></div>'
        + '<div class="pc-tags">'
          + '<span class="d-tag">'+p.weeks+' weeks</span>'
          + '<span class="d-tag">'+p.days+' days/week</span>'
          + '<span class="d-tag">'+esc(p.level)+'</span>'
        + '</div>'
        + '<span class="pc-open">View program <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>'
        + '</a>';
    }).join('');
    contentEl.innerHTML =
        '<div class="list-head">'
          + '<div class="d-split">Free training programs</div>'
          + '<h1 id="title">A full year of training.</h1>'
          + '<p id="desc">Complete, periodised programs, beginner to advanced. Pick one, import it into JSON.fit, and follow it week by week. Free, no AI step needed.</p>'
        + '</div>'
        + '<div class="plist">'+cards+'</div>';
    loadingEl.style.display='none';
    contentEl.style.display='block';
    document.title = 'Training programs — JSON.fit';
  }

  if(!slug){ renderList(); return; }
  fetch(FILE)
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(render)
    .catch(function(e){ console.error(e); showError('This program isn\'t available yet.'); });
})();
</script>
</body>
</html>
